# Featured grid announcements and events.
# Each entry renders as a full-width card at the top of the featured content grid.
# Remove or comment out entries when they are no longer relevant.
#
# Fields:
#   title:       (required) Headline for the card
#   url:         (required) Link destination
#   description: (optional) Supporting text
#   date:        (optional) Event date or deadline, displayed on the card
#   type:        (optional) Label shown on the card — defaults to "Announcement"
